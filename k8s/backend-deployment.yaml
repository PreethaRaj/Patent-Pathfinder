apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: innovation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: intelligent-innovation-copilot/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: innovation-secrets
          env:
            - name: LLM_PROVIDER
              value: vllm
            - name: VLLM_BASE_URL
              value: http://vllm:8000
            - name: DATABASE_URL
              value: postgresql+psycopg://innovation:innovation@postgres:5432/innovation
            - name: OPENSEARCH_URL
              value: http://opensearch:9200
            - name: NEO4J_URL
              value: bolt://neo4j:7687
            - name: REDIS_URL
              value: redis://redis:6379/0
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: innovation
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
