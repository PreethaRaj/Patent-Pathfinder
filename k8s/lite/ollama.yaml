apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1
  selector:
    matchLabels: { app: ollama }
  template:
    metadata:
      labels: { app: ollama }
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.3.14
          ports:
            - containerPort: 11434
          env:
            - { name: OLLAMA_NUM_PARALLEL, value: "2" }
            - { name: OLLAMA_MAX_LOADED_MODELS, value: "1" }
          resources:
            requests: { cpu: "500m", memory: "2Gi" }
            limits: { cpu: "2000m", memory: "6Gi" }
          readinessProbe:
            httpGet: { path: /api/tags, port: 11434 }
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
spec:
  selector: { app: ollama }
  ports:
    - port: 11434
      targetPort: 11434
