apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: intelligent-innovation-copilot/frontend:lite
          ports:
            - containerPort: 3000
          env:
            - { name: NEXT_PUBLIC_API_BASE_URL, value: "http://backend:8000/api/v1" }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector: { app: frontend }
  ports:
    - port: 3000
      targetPort: 3000
