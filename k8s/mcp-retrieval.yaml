apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-retrieval
  namespace: innovation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-retrieval
  template:
    metadata:
      labels:
        app: mcp-retrieval
    spec:
      containers:
        - name: mcp-retrieval
          image: intelligent-innovation-copilot/mcp-retrieval:latest
          ports:
            - containerPort: 8101
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-retrieval
  namespace: innovation
spec:
  selector:
    app: mcp-retrieval
  ports:
    - port: 8101
      targetPort: 8101
