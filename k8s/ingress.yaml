apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: innovation-ingress
  namespace: innovation
spec:
  rules:
    - host: innovation.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
