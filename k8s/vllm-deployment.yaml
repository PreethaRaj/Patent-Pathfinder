apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: innovation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector:
        accelerator: nvidia
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args: ["--model", "meta-llama/Llama-3.1-70B-Instruct", "--served-model-name", "llama3.1"]
          resources:
            limits:
              nvidia.com/gpu: "1"
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: innovation
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: 8000
